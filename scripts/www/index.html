<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月经周期记录与安全期预测</title>
    <style>
        :root {
            --primary-color: #ff4d7d;
            --light-pink: #ffe6ed;
            --safe-green: #e6f9ed;
            --safe-green-text: #27ae60;
            --purple-text: #b259ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 375px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .login-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .login-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-title {
            font-size: 22px;
            color: var(--primary-color);
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            position: relative;
        }

        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .bj-time-bar {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            text-align: left;
            margin-bottom: 10px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .month-selector {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
        }
        .nav-btn.year {
            font-size: 15px;
            opacity: 0.7;
        }
        .nav-btn.year:hover {
            opacity: 1;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 10px 5px;
            background: #fff;
            font-size: 14px;
            color: #999;
            border-bottom: 1px solid #eee;
        }
        .weekdays div:nth-child(1), .weekdays div:nth-child(7) {
            color: var(--primary-color);
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 5px;
            background: #fff;
        }

        .day-cell {
            height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            color: #333;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .lunar-text {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }

        .day-cell.empty { cursor: default; }

        .day-cell.is-today .solar-num {
            background-color: #222 !important;
            color: #fff !important;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .day-cell.is-today .lunar-text {
            color: #222 !important;
            font-weight: bold;
        }

        .day-cell.period-active {
            background-color: var(--primary-color) !important;
            border-radius: 8px;
        }
        .day-cell.period-active .solar-num { color: white !important; background: transparent !important; box-shadow: none !important; }
        .day-cell.period-active .lunar-text { color: #ffe6ed !important; }

        .day-cell.period-active.is-today .solar-num {
            border: 2px solid white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .day-cell.period-start-icon::after {
            content: '🩸';
            font-size: 9px;
            position: absolute;
            top: 2px;
            right: 2px;
        }

        .day-cell.safe-zone {
            background-color: var(--safe-green);
        }
        .day-cell.safe-zone .solar-num { color: var(--safe-green-text); font-weight: bold; }
        .day-cell.safe-zone .lunar-text { color: #78cfa0; }
        .day-cell.safe-zone.is-today .solar-num { color: white; }

        .day-cell.fertile-window .solar-num { color: var(--purple-text); }
        .day-cell.fertile-window .lunar-text { color: #cc99ff; }
        .day-cell.fertile-window.is-today .solar-num { color: white; }

        .day-cell.ovulation-day::before {
            content: '🌼';
            font-size: 10px;
            position: absolute;
            top: 2px;
            right: 2px;
        }

        /* 底部功能栏 */
        .bottom-bar {
            border-top: 1px solid #eee;
            background: #fff;
        }

        /* 设置入口按钮 */
        .settings-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .settings-toggle:hover {
            background: #fafafa;
        }
        .settings-toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        .settings-toggle-icon {
            font-size: 12px;
            color: #999;
            transition: transform 0.3s;
        }
        .settings-toggle-icon.open {
            transform: rotate(180deg);
        }

        /* 折叠面板 */
        .settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .settings-panel.open {
            max-height: 400px;
        }

        .settings-content {
            padding: 0 20px 20px;
        }

        .legend {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-bottom: 16px;
            padding: 0 5px;
        }

        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
        .dot.m { background: var(--primary-color); }
        .dot.p { background: var(--safe-green); border: 1px solid var(--safe-green-text); }
        .dot.f { color: var(--purple-text); font-size: 12px; }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 14px;
            color: #444;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-row input {
            width: 60px;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .btn-action {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        /* 广告区域 */
        .ad-area {
            padding: 12px 20px 16px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .ad-label {
            font-size: 10px;
            color: #ccc;
            letter-spacing: 1px;
        }
        .ad-placeholder {
            width: 100%;
            height: 60px;
            background: #fafafa;
            border: 1px dashed #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="login-title">女子月经周期管理系统</div>
            <input type="text" id="username" placeholder="请输入用户名 (任意填写)">
            <input type="password" id="password" placeholder="请输入密码 (任意填写)">
            <button class="btn-action" onclick="handleLogin()">登录 / 切换账户</button>
            <p style="font-size: 11px; color:#999; text-align:center; margin-top:10px;">
                提示：您的账号密码和日历数据均保存在本地电脑，直接发送文件不会泄露隐私。
            </p>
        </div>
    </div>

    <div class="header">
        <div class="user-info-bar">
            <span>当前账户: <b id="displayUser">未登录</b></span>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>
        <div class="bj-time-bar" id="bjTimeDisplay">北京时间加载中...</div>

        <div class="month-selector">
            <button class="nav-btn year" onclick="changeYear(-1)">&lt;&lt;</button>
            <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
            <span id="currentMonthStr">2026年5月</span>
            <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
            <button class="nav-btn year" onclick="changeYear(1)">&gt;&gt;</button>
        </div>
    </div>

    <div class="weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
    </div>

    <div class="days-grid" id="daysGrid"></div>

    <!-- 底部功能栏 -->
    <div class="bottom-bar">
        <!-- 设置入口 -->
        <div class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
            <div class="settings-toggle-label">
                <span>⚙️</span>
                <span>设置</span>
            </div>
            <span class="settings-toggle-icon" id="settingsArrow">▼</span>
        </div>

        <!-- 折叠面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-content">
                <div class="legend">
                    <div class="legend-item"><span class="dot m"></span>月经期</div>
                    <div class="legend-item"><span class="dot p"></span>安全期</div>
                    <div class="legend-item"><span class="dot f">💜</span>易孕期</div>
                    <div class="legend-item"><span>🌼</span>排卵日</div>
                </div>

                <div class="settings-group">
                    <div class="setting-row">
                        <label>平均行经天数 (天):</label>
                        <input type="number" id="periodLength" value="6" min="1" max="15" onchange="saveAndCalculate()">
                    </div>
                    <div class="setting-row">
                        <label>平均周期长度 (天):</label>
                        <input type="number" id="cycleLength" value="28" min="20" max="45" onchange="saveAndCalculate()">
                    </div>
                    <div class="setting-row" style="border-top: 1px dashed #eee; padding-top: 10px;">
                        <span id="selectedDateText">点击日历选择一天进行记录</span>
                    </div>
                    <button class="btn-action" id="actionBtn" onclick="togglePeriodStart()">设为月经第一天</button>
                </div>
            </div>
        </div>

        <!-- 广告预留位 -->
        <div class="ad-area">
            <span class="ad-label">- 广告 -</span>
            <div class="ad-placeholder">联系作者detubi8292@gmail.com</div>
        </div>
    </div>
</div>

<script>
    // 完整万年历数据 (1900-2100)
    const LUNAR_INFO = [
        0x04bd8, 0x04ae0, 0x0a570, 0x054d5, 0x0d260, 0x0d950, 0x16554, 0x056a0, 0x09ad0, 0x055d2, //1900-1909
        0x04ae0, 0x0a5b6, 0x0a4d0, 0x0d250, 0x1d255, 0x0b540, 0x0d6a0, 0x0ada2, 0x095b0, 0x14977, //1910-1919
        0x04970, 0x0a4b0, 0x0b4b5, 0x06a50, 0x06d40, 0x1ab54, 0x02b60, 0x09570, 0x052f2, 0x04970, //1920-1929
        0x06566, 0x0d4a0, 0x0ea50, 0x06e95, 0x05ad0, 0x02b60, 0x186e3, 0x092e0, 0x1c8d7, 0x0c950, //1930-1939
        0x0d4a0, 0x1d8a6, 0x0b550, 0x056a0, 0x1a5b4, 0x025d0, 0x092d0, 0x0d2b2, 0x0a950, 0x0b557, //1940-1949
        0x06ca0, 0x0b550, 0x15355, 0x04da0, 0x0a5b0, 0x14573, 0x052b0, 0x0a9a8, 0x0e950, 0x06aa0, //1950-1959
        0x0aea6, 0x0ab50, 0x04b60, 0x0aae4, 0x0a570, 0x05260, 0x0f263, 0x0d950, 0x05b57, 0x056a0, //1960-1969
        0x096d0, 0x04dd5, 0x04ad0, 0x0a4d0, 0x0d4d4, 0x0d250, 0x0d558, 0x0b540, 0x0b6a0, 0x195a6, //1970-1979
        0x095b0, 0x049b0, 0x0a974, 0x0a4b0, 0x0b27a, 0x06a50, 0x06d40, 0x0af46, 0x0ab60, 0x09570, //1980-1989
        0x04af5, 0x04970, 0x064b0, 0x074a3, 0x0ea50, 0x06b58, 0x05ac0, 0x0ab60, 0x096d5, 0x092e0, //1990-1999
        0x0c960, 0x0d954, 0x0d4a0, 0x0da50, 0x07552, 0x056a0, 0x0abb7, 0x025d0, 0x092d0, 0x0cab5, //2000-2009
        0x0a950, 0x0b4a0, 0x0baa4, 0x0ad50, 0x055d9, 0x04ba0, 0x0a5b0, 0x15176, 0x052b0, 0x0a930, //2010-2019
        0x07954, 0x06aa0, 0x0ad50, 0x05b52, 0x04b60, 0x0a6e6, 0x0a4e0, 0x0d260, 0x0ea65, 0x0d530, //2020-2029
        0x05aa0, 0x076a3, 0x096d0, 0x04afb, 0x04ad0, 0x0a4d0, 0x1d0b6, 0x0d250, 0x0d520, 0x0dd45, //2030-2039
        0x0b5a0, 0x056d0, 0x055b2, 0x049b0, 0x0a577, 0x0a4b0, 0x0aa50, 0x1b255, 0x06d20, 0x0ada0, //2040-2049
        0x14b63, 0x09370, 0x049f8, 0x04970, 0x064b0, 0x168a6, 0x0ea50, 0x06b20, 0x1a6c4, 0x0aae0, //2050-2059
        0x0a2e0, 0x0d2e3, 0x0c960, 0x0d557, 0x0d4a0, 0x0da50, 0x05d55, 0x056a0, 0x0a6d0, 0x055d4, //2060-2069
        0x052d0, 0x0a9b8, 0x0a950, 0x0b4a0, 0x0b6a6, 0x0ad50, 0x055a0, 0x0aba4, 0x0a5b0, 0x052b0, //2070-2079
        0x0b273, 0x06930, 0x07337, 0x06aa0, 0x0ad50, 0x14b55, 0x04b60, 0x0a570, 0x054e4, 0x0d160, //2080-2089
        0x0e968, 0x0d520, 0x0daa0, 0x16aa6, 0x056d0, 0x04ae0, 0x0a9d4, 0x0a2d0, 0x0d150, 0x0f252, //2090-2099
        0x0d520                                                                                      //2100
    ];
    const LUNAR_DOMESTIC = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
    const LUNAR_MONTHS = ["正","二","三","四","五","六","七","八","九","十","十一","腊"];

    function getLunarDayStr(year, month, day) {
        const baseDate = Date.UTC(1900, 0, 31);
        const objDate = Date.UTC(year, month, day);
        let offset = Math.round((objDate - baseDate) / 86400000);

        let i, leap = 0, temp = 0;
        for (i = 1900; i < 2100 && offset > 0; i++) { temp = getLunarYearDays(i); offset -= temp; }
        if (offset < 0) { offset += temp; i--; }

        let lunarYear = i;
        leap = getLeapMonth(lunarYear);
        let isLeap = false;

        for (i = 1; i < 13 && offset > 0; i++) {
            if (leap > 0 && i === (leap + 1) && !isLeap) { --i; isLeap = true; temp = getLeapDays(lunarYear); }
            else { temp = getLunarMonthDays(lunarYear, i); }
            if (isLeap && i === (leap + 1)) isLeap = false;
            offset -= temp;
        }
        if (offset === 0 && leap > 0 && i === leap + 1) { if (isLeap) { isLeap = false; } else { isLeap = true; --i; } }
        if (offset < 0) { offset += temp; --i; }

        let lunarDay = offset + 1;
        return lunarDay === 1 ? LUNAR_MONTHS[i - 1] + "月" : LUNAR_DOMESTIC[lunarDay - 1];
    }
    function getLunarYearDays(y) { let i, sum = 348; for (i = 0x8000; i > 0x8; i >>= 1) sum += (LUNAR_INFO[y - 1900] & i) ? 1 : 0; return sum + getLeapDays(y); }
    function getLeapMonth(y) { return LUNAR_INFO[y - 1900] & 0xf; }
    function getLeapDays(y) { if (getLeapMonth(y)) return (LUNAR_INFO[y - 1900] & 0x10000) ? 30 : 29; return 0; }
    function getLunarMonthDays(y, m) { return (LUNAR_INFO[y - 1900] & (0x10000 >> m)) ? 30 : 29; }

    // 折叠面板状态
    let settingsOpen = false;

    function toggleSettings() {
        settingsOpen = !settingsOpen;
        const panel = document.getElementById('settingsPanel');
        const arrow = document.getElementById('settingsArrow');
        panel.classList.toggle('open', settingsOpen);
        arrow.classList.toggle('open', settingsOpen);
    }

    // 主程序状态
    let currentUser = null;
    let currentDate = new Date();
    let selectedDateStr = null;
    let periodStarts = [];
    let allPeriodDays = new Set();
    let fertileWindows = new Set();
    let ovulationDays = new Set();
    let earliestStartDate = null;
    let bjServerTime = new Date();
    let lastDateString = "";

    window.onload = function() {
        initBeijingTime();
        autoLoginCheck();
    }

    function initBeijingTime() {
        fetch('https://quan.suning.com/getSysTime.do')
            .then(response => response.json())
            .then(data => {
                if(data && data.sysTime2) {
                    bjServerTime = new Date(data.sysTime2.replace(/-/g, '/'));
                }
                startClockLoop();
            })
            .catch(err => {
                console.log("网络时间获取失败，使用本地时间。");
                bjServerTime = new Date();
                startClockLoop();
            });
    }

    function startClockLoop() {
        setInterval(() => {
            bjServerTime.setTime(bjServerTime.getTime() + 1000);

            const year = bjServerTime.getFullYear();
            const month = String(bjServerTime.getMonth() + 1).padStart(2, '0');
            const day = String(bjServerTime.getDate()).padStart(2, '0');
            const hours = String(bjServerTime.getHours()).padStart(2, '0');
            const minutes = String(bjServerTime.getMinutes()).padStart(2, '0');
            const seconds = String(bjServerTime.getSeconds()).padStart(2, '0');

            const timeStr = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            document.getElementById('bjTimeDisplay').innerText = `北京时间: ${timeStr}`;

            const currentDateString = `${year}-${month}-${day}`;
            if (lastDateString !== "" && lastDateString !== currentDateString) {
                calculateCycles();
            }
            lastDateString = currentDateString;

        }, 1000);
    }

    function autoLoginCheck() {
        const lastUser = localStorage.getItem('last_logged_in_user');
        const lastPass = localStorage.getItem('last_logged_in_pass');
        if (lastUser && lastPass) {
            document.getElementById('username').value = lastUser;
            document.getElementById('password').value = lastPass;
            handleLogin();
        }
    }

    function handleLogin() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();

        if (!user || !pass) {
            alert('用户名和密码不能为空！');
            return;
        }

        currentUser = user;
        document.getElementById('displayUser').innerText = user;
        document.getElementById('loginOverlay').style.display = 'none';

        localStorage.setItem('last_logged_in_user', user);
        localStorage.setItem('last_logged_in_pass', pass);

        loadUserData();
    }

    function handleLogout() {
        localStorage.removeItem('last_logged_in_user');
        localStorage.removeItem('last_logged_in_pass');
        currentUser = null;
        periodStarts = [];
        selectedDateStr = null;
        earliestStartDate = null;
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('selectedDateText').innerText = '点击日历选择一天进行记录';
    }

    function saveUserData() {
        if (!currentUser) return;
        const dataToSave = {
            periodStarts: periodStarts,
            periodLength: document.getElementById('periodLength').value,
            cycleLength: document.getElementById('cycleLength').value
        };
        localStorage.setItem(`period_data_${currentUser}`, JSON.stringify(dataToSave));
    }

    function loadUserData() {
        const savedData = localStorage.getItem(`period_data_${currentUser}`);
        if (savedData) {
            const parsed = JSON.parse(savedData);
            periodStarts = parsed.periodStarts || [];
            document.getElementById('periodLength').value = parsed.periodLength || 6;
            document.getElementById('cycleLength').value = parsed.cycleLength || 28;
        } else {
            periodStarts = [];
            document.getElementById('periodLength').value = 6;
            document.getElementById('cycleLength').value = 28;
        }
        calculateCycles();
    }

    function saveAndCalculate() {
        saveUserData();
        calculateCycles();
    }

    function calculateCycles() {
        allPeriodDays.clear();
        fertileWindows.clear();
        ovulationDays.clear();
        earliestStartDate = null;

        const pLength = parseInt(document.getElementById('periodLength').value) || 6;
        const cLength = parseInt(document.getElementById('cycleLength').value) || 28;

        if (periodStarts.length === 0) {
            renderCalendar();
            return;
        }

        let sortedStarts = [...periodStarts].map(d => new Date(d)).sort((a,b) => a - b);
        earliestStartDate = sortedStarts[0];

        sortedStarts.forEach(start => {
            for(let i=0; i<pLength; i++) {
                let d = new Date(start);
                d.setDate(start.getDate() + i);
                allPeriodDays.add(formatDate(d));
            }
        });

        let baseDate = new Date(sortedStarts[sortedStarts.length - 1]);
        for(let cycle = 1; cycle <= 3; cycle++) {
            let nextStart = new Date(baseDate);
            nextStart.setDate(baseDate.getDate() + (cLength * cycle));

            for(let i=0; i<pLength; i++) {
                let d = new Date(nextStart);
                d.setDate(nextStart.getDate() + i);
                allPeriodDays.add(formatDate(d));
            }

            let ovulation = new Date(nextStart);
            ovulation.setDate(nextStart.getDate() - 14);
            ovulationDays.add(formatDate(ovulation));

            for(let i = -5; i <= 4; i++) {
                let fDay = new Date(ovulation);
                fDay.setDate(ovulation.getDate() + i);
                fertileWindows.add(formatDate(fDay));
            }
        }
        renderCalendar();
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        document.getElementById('currentMonthStr').innerText = `${year}年${month + 1}月`;

        const grid = document.getElementById('daysGrid');
        grid.innerHTML = '';

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        const todayRealStr = formatDate(bjServerTime);

        for (let i = 0; i < firstDayIndex; i++) {
            let emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dateSrc = new Date(year, month, day);
            const dateStr = formatDate(dateSrc);

            let cell = document.createElement('div');
            cell.className = 'day-cell';

            let solarSpan = document.createElement('span');
            solarSpan.className = 'solar-num';
            solarSpan.innerText = day;

            let lunarSpan = document.createElement('span');
            lunarSpan.className = 'lunar-text';
            lunarSpan.innerText = getLunarDayStr(year, month, day);

            cell.appendChild(solarSpan);
            cell.appendChild(lunarSpan);
            cell.dataset.date = dateStr;

            if (dateStr === todayRealStr) {
                cell.classList.add('is-today');
            }

            if (allPeriodDays.has(dateStr)) {
                cell.classList.add('period-active');
                if (periodStarts.includes(dateStr)) {
                    cell.classList.add('period-start-icon');
                }
            } else if (ovulationDays.has(dateStr)) {
                if (earliestStartDate && dateSrc >= earliestStartDate) {
                    cell.classList.add('ovulation-day');
                }
            } else if (fertileWindows.has(dateStr)) {
                if (earliestStartDate && dateSrc >= earliestStartDate) {
                    cell.classList.add('fertile-window');
                }
            } else {
                if (earliestStartDate && dateSrc >= earliestStartDate) {
                    cell.classList.add('safe-zone');
                }
            }

            if (dateStr === selectedDateStr) {
                cell.style.border = '2px solid #333';
                cell.style.borderRadius = '8px';
            }

            cell.onclick = function() {
                selectDate(dateStr);
            };

            grid.appendChild(cell);
        }
    }

    function selectDate(dateStr) {
        selectedDateStr = dateStr;
        document.getElementById('selectedDateText').innerText = `已选日期: ${dateStr}`;

        const btn = document.getElementById('actionBtn');
        if (periodStarts.includes(dateStr)) {
            btn.innerText = '取消月经第一天标记';
        } else {
            btn.innerText = '设为月经第一天';
        }
        renderCalendar();
    }

    function togglePeriodStart() {
        if (!selectedDateStr) {
            alert('请先在日历上点击选择一天');
            return;
        }
        const index = periodStarts.indexOf(selectedDateStr);
        if (index > -1) {
            periodStarts.splice(index, 1);
        } else {
            periodStarts.push(selectedDateStr);
        }
        selectDate(selectedDateStr);
        saveAndCalculate();
    }

    function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        renderCalendar();
    }

    function changeYear(direction) {
        currentDate.setFullYear(currentDate.getFullYear() + direction);
        renderCalendar();
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }
</script>

</body>
</html>
